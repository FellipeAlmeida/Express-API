<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Sistema de Estoque</title>

    <link rel="stylesheet" href="./styles/reset.css">
    <link rel="stylesheet" href="./styles/style.css">
</head>
<body>
    <main class="login" id="login">
            <div class="box">

                <div class="textos">
                    <h1>Bem vindo ao StockFlow!</h1>
                    <p>Faça login para continuar</p>
                </div>

                <div class="inputs">
                    <div class="input-email">
                        <p>Email</p>
                        <input type="text" placeholder="📧 seu@email.com" class="email" id="email">
                    </div>

                    <div class="input-senha">
                        <p>Senha</p>
                        <input type="password" placeholder="🔒 ........" class="senha" id="senha">
                    </div>
                </div>

                <button class="entrar">Entrar</button>

                <p>Não tem uma conta? <label class="cadastrar">Cadastre-se</label></p>

                <p class="mensagens"></p>
            </div>
    </main>
    
    <script src="./scripts/index.js"></script>
</body>
</html>
